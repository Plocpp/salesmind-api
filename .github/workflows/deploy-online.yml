name: Deploy Online

on:
  workflow_run:
    workflows: ["Pre-Deploy Validation"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/salesmind-api
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Render API deploy
        if: ${{ secrets.RENDER_API_DEPLOY_HOOK != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
          echo "Render API deploy acionado."

      - name: Trigger Render frontend deploy
        if: ${{ secrets.RENDER_APP_DEPLOY_HOOK != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_APP_DEPLOY_HOOK }}"
          echo "Render frontend deploy acionado."

      - name: Warn when Render hooks are missing
        if: ${{ secrets.RENDER_API_DEPLOY_HOOK == '' || secrets.RENDER_APP_DEPLOY_HOOK == '' }}
        run: |
          echo "Aviso: um ou mais deploy hooks do Render nao estao configurados."
          echo "Configure os secrets RENDER_API_DEPLOY_HOOK e RENDER_APP_DEPLOY_HOOK para deploy 100% automatico."

      - name: Deployment summary
        run: |
          echo "Imagem publicada com sucesso no GHCR."
          echo "Repositorio: ghcr.io/${{ github.repository }}/salesmind-api"
          echo "Tags: latest e sha"
          if [ -n "${{ secrets.RENDER_API_DEPLOY_HOOK }}" ]; then
            echo "Render API: hook executado"
          else
            echo "Render API: hook nao configurado"
          fi

          if [ -n "${{ secrets.RENDER_APP_DEPLOY_HOOK }}" ]; then
            echo "Render frontend: hook executado"
          else
            echo "Render frontend: hook nao configurado"
          fi
