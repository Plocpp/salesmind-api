name: Contracts Validation

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - "contracts/v1/**"
      - "scripts/check-openapi-breaking.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts-validation.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "contracts/v1/**"
      - "scripts/check-openapi-breaking.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts-validation.yml"

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npm run contracts:lint

      - name: Check breaking changes (PR only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: npm run contracts:breaking
