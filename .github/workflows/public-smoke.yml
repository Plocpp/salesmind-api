name: Public Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL publica da API (ex: https://api.seudominio.com)"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: ${{ inputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run public smoke
        run: npm run test:smoke
