services:
  - type: web
    name: salesmind-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npx prisma generate && npx prisma db push && npm run seed
    startCommand: npm run start:runtime
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_PUBLIC
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ONBOARDING_WEBHOOK_TOKEN
        sync: false
      - key: INTEGRACOES_ENCRYPTION_KEY
        sync: false
      - key: TRUST_PROXY
        value: "1"
      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_MAX_GLOBAL
        value: "600"
      - key: RATE_LIMIT_MAX_AUTH
        value: "60"
      - key: PASSWORD_MIN_LENGTH
        value: "10"
      - key: LOGIN_MAX_ATTEMPTS_BASE
        value: "5"
      - key: LOGIN_FAILURE_WINDOW_MINUTES
        value: "30"
      - key: LOGIN_BLOCK_MINUTES_BASE
        value: "10"
      - key: LOGIN_BLOCK_MULTIPLIER
        value: "2"
      - key: LOGIN_BLOCK_MAX_MINUTES
        value: "120"
      - key: EMAIL_MOCK_MODE
        value: "false"
      - key: EMAIL_PROVIDER
        value: outlook
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: FRONTEND_BASE_URL
        value: https://salesmind-app.onrender.com
      - key: CORS_ORIGIN_ALLOWLIST
        value: https://salesmind-app.onrender.com
      - key: CORS_ALLOWED_METHODS
        value: GET,POST,PUT,PATCH,DELETE,OPTIONS
      - key: CORS_ALLOWED_HEADERS
        value: Authorization,Content-Type,x-onboarding-webhook-token
      - key: PUBLIC_BASE_URL
        value: https://salesmind-api.onrender.com

  - type: web
    name: salesmind-app
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://salesmind-api.onrender.com
